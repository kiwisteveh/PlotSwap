<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plot Swap — Multi-Level</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Plot Swap — To Kill a Mockingbird</h1>

  <label for="levelSelect">Choose Level:</label>
  <select id="levelSelect">
    <option value="1">Level 1 (12 events)</option>
    <option value="2">Level 2 (12 of 18)</option>
    <option value="3">Level 3 (12 of 24)</option>
  </select>

  <button id="newSetBtn">Load New Set</button>

  <div id="gameBoard" class="board"></div>

  <button id="checkBtn">Check Order</button>
  <p id="result"></p>

  <script src="script.js"></script>
</body>
</html>
