<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plot Swap — To Kill a Mockingbird</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">Plot Swap</h1>
  <h2 class="subtitle">To Kill a Mockingbird — Event Ordering Game</h2>
  <p class="instructions">Drag and drop the events into the correct chronological order.</p>
<div id="progressContainer">
  <div id="progressBar"></div>
</div>
<p id="progressText"></p>

  <label for="levelSelect"><strong>Choose Level:</strong></label>
  <select id="levelSelect">
    <option value="1">Level 1 (12 events)</option>
    <option value="2">Level 2 (12 of 18)</option>
    <option value="3">Level 3 (12 of 24)</option>
  </select>

  <button id="newSetBtn">Load New Set</button>

  <div id="gameBoard" class="board"></div>

  <script src="script.js"></script>
</body>
</html>
