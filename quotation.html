<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="pageFrame">

    <h1 class="title">Quotation Quiz</h1>
    <h2 class="subtitle">Who Said It?</h2>

    <div id="quizContainer">

      <div id="quoteBox">
        <p id="quoteText">Loading...</p>
      </div>

      <div id="optionsContainer">
        <!-- Buttons generated by JS -->
      </div>

      <button id="hintButton">Show Hint</button>
      <p id="hintText" class="hidden"></p>

      <div id="progressBar">
        <div id="progressFill"></div>
      </div>

    </div>

    <div id="resultScreen" class="hidden">
      <h2>Your Score</h2>
      <p id="finalScore"></p>
      <button onclick="location.reload()">Play Again</button>
      <button onclick="location.href='index.html'">Return to Menu</button>
    </div>

    <button class="return-button" onclick="location.href='index.html'">Return to Menu</button>

  </div>

  <script src="quotation.js"></script>


</body>
</html>
